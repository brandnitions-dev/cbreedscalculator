let mode="face",batchSize=100,pools={a:[],b:[],eo:[]},idCtr=0;

function sqrtBarWidthNorm(pPercent,maxSqrtScale){
  var v=Math.sqrt(Math.max(0,pPercent)/100);
  var mx=maxSqrtScale>0?maxSqrtScale:1e-9;
  return Math.min(100,Math.round((v/mx)*1000)/10);
}

function setMode(el,m){document.querySelectorAll(".mbtn").forEach(b=>b.classList.remove("active"));el.classList.add("active");mode=m;document.getElementById("eoPoolPct").textContent=(m==="face"?"1":"2")+"% of batch";update();}
document.getElementById("batchSize").addEventListener("input",function(){batchSize=+this.value;document.getElementById("batchSizeVal").textContent=batchSize+" ml";update();});

function addIng(pool){
  const limits={a:4,b:3,eo:6};
  if(pools[pool].length>=limits[pool])return;
  const used=pools[pool].map(r=>r.ingId);
  const avail=ING[pool].filter(i=>!used.includes(i.id));
  if(!avail.length)return;
  pools[pool].push({id:idCtr++,ingId:avail[0].id,weight:5});
  renderPool(pool);update();
}

function removeIng(pool,id){pools[pool]=pools[pool].filter(r=>r.id!==id);renderPool(pool);update();}

function getTipLevel(weight){return weight<=3?"low":weight<=7?"mid":"high";}

function renderPool(pool){
  const container=document.getElementById(pool+"Pool");
  container.innerHTML="";
  const f=calcFormula();
  const split=pool==="a"?f.aSplit:pool==="b"?f.bSplit:f.eoSplit;

  pools[pool].forEach((row,i)=>{
    const ing=ING[pool].find(x=>x.id===row.ingId);
    const splitRow=split.find(s=>s.id===row.id);
    const pct=splitRow?(splitRow.pct*100).toFixed(1):"—";
    const ml=splitRow?(splitRow.pct*batchSize).toFixed(1):"—";

    const block=document.createElement("div");block.className="ing-block";

    const top=document.createElement("div");top.className="ing-top";
    const sel=document.createElement("select");
    const used=pools[pool].filter(r=>r.id!==row.id).map(r=>r.ingId);
    ING[pool].forEach(opt=>{const o=document.createElement("option");o.value=opt.id;o.textContent=opt.name;if(used.includes(opt.id))o.disabled=true;if(opt.id===row.ingId)o.selected=true;sel.appendChild(o);});
    sel.addEventListener("change",function(){row.ingId=this.value;renderPool(pool);update();});

    const pctSpan=document.createElement("span");pctSpan.className="ing-pct";pctSpan.id="pct_"+row.id;pctSpan.textContent=pct+"%";
    const mlSpan=document.createElement("span");mlSpan.className="ing-ml";mlSpan.id="ml_"+row.id;mlSpan.textContent=ml+"ml";
    const rm=document.createElement("button");rm.className="remove-btn";rm.textContent="×";rm.addEventListener("click",()=>removeIng(pool,row.id));
    top.appendChild(sel);top.appendChild(pctSpan);top.appendChild(mlSpan);top.appendChild(rm);

    const sliderRow=document.createElement("div");sliderRow.className="slider-row";
    const sliderLabel=document.createElement("span");sliderLabel.className="slider-label";sliderLabel.textContent="share";
    const slider=document.createElement("input");slider.type="range";slider.min=1;slider.max=10;slider.step=1;slider.value=row.weight;
    slider.addEventListener("input",function(){row.weight=+this.value;updateInlineOnly(pool,row.id,this.value);update();});
    sliderRow.appendChild(sliderLabel);sliderRow.appendChild(slider);

    const desc=document.createElement("div");desc.className="ing-desc";desc.textContent=ing?ing.desc:"";

    const tipLevel=getTipLevel(row.weight);
    const tipText=ing&&ing.tips?ing.tips[tipLevel]:"";
    const tipClass=tipLevel==="low"?"tip-low":tipLevel==="mid"?"tip-mid":ing&&ing.potency==="strong"&&tipLevel==="high"?"tip-warn":"tip-high";
    const tip=document.createElement("div");tip.className="ing-tip "+tipClass;tip.id="tip_"+row.id;tip.textContent=tipText;

    block.appendChild(top);block.appendChild(sliderRow);block.appendChild(desc);block.appendChild(tip);
    container.appendChild(block);
  });
}

function updateInlineOnly(pool,rowId,weight){
  const tipLevel=getTipLevel(+weight);
  const row=pools[pool].find(r=>r.id===rowId);
  if(!row)return;
  const ing=ING[pool].find(x=>x.id===row.ingId);
  const tipEl=document.getElementById("tip_"+rowId);
  if(tipEl&&ing&&ing.tips){
    tipEl.textContent=ing.tips[tipLevel]||"";
    tipEl.className="ing-tip "+(tipLevel==="low"?"tip-low":tipLevel==="mid"?"tip-mid":ing.potency==="strong"&&tipLevel==="high"?"tip-warn":"tip-high");
  }
}

function calcFormula(){
  const eoPct=mode==="face"?0.01:0.02;
  const fixed=[{name:"Tallow",pct:0.58,color:COLORS.tallow},{name:"Beeswax",pct:0.08,color:COLORS.beeswax},{name:"Jojoba",pct:0.11,color:COLORS.jojoba},{name:"Vitamin E",pct:0.004,color:COLORS.vite}];
  function split(rows,total){const tw=rows.reduce((s,r)=>s+r.weight,0)||1;return rows.map(r=>({...r,pct:total*r.weight/tw}));}
  return{fixed,aSplit:split(pools.a,0.13),bSplit:split(pools.b,0.06),eoSplit:split(pools.eo,eoPct),eoPct};
}

function update(){
  const f=calcFormula();
  [...f.aSplit,...f.bSplit,...f.eoSplit].forEach(row=>{
    const pe=document.getElementById("pct_"+row.id);const me=document.getElementById("ml_"+row.id);
    if(pe)pe.textContent=(row.pct*100).toFixed(1)+"%";
    if(me)me.textContent=(row.pct*batchSize).toFixed(1)+"ml";
  });
  updateBeaker(f);updateRatios(f);updateBenefits(f);updateSynergies(f);updateWarnings(f);
}

function updateBeaker(f){
  const layers=document.getElementById("beakerLayers");layers.innerHTML="";
  const all=[...f.fixed,...f.aSplit.map((r,i)=>({name:ING.a.find(x=>x.id===r.ingId)?.name||"A",pct:r.pct,color:COLORS["a"+i]||"#85B7EB"})),...f.bSplit.map((r,i)=>({name:ING.b.find(x=>x.id===r.ingId)?.name||"B",pct:r.pct,color:COLORS["b"+i]||"#D85A30"})),...f.eoSplit.map((r,i)=>({name:ING.eo.find(x=>x.id===r.ingId)?.name||"EO",pct:r.pct,color:COLORS["eo"+i]||"#534AB7"}))];
  const total=all.reduce((s,r)=>s+r.pct,0)||1;
  let y=20+230;
  all.forEach(layer=>{const h=Math.max(2,(layer.pct/total)*230);y-=h;const rect=document.createElementNS("http://www.w3.org/2000/svg","rect");rect.setAttribute("x","31");rect.setAttribute("y",y.toFixed(1));rect.setAttribute("width","118");rect.setAttribute("height",h.toFixed(1));rect.setAttribute("fill",layer.color);rect.setAttribute("opacity","0.85");layers.appendChild(rect);});
}

function updateRatios(f){
  const list=document.getElementById("ratioList");list.innerHTML="";
  const all=[...f.fixed.map(r=>({name:r.name,pct:r.pct,color:r.color})),...f.aSplit.map((r,i)=>({name:ING.a.find(x=>x.id===r.ingId)?.name||"A",pct:r.pct,color:COLORS["a"+i]||"#85B7EB"})),...f.bSplit.map((r,i)=>({name:ING.b.find(x=>x.id===r.ingId)?.name||"B",pct:r.pct,color:COLORS["b"+i]||"#D85A30"})),...f.eoSplit.map((r,i)=>({name:ING.eo.find(x=>x.id===r.ingId)?.name||"EO",pct:r.pct,color:COLORS["eo"+i]||"#534AB7"}))];
  const maxSqrt=Math.max.apply(null,all.map(r=>Math.sqrt(Math.max(0,r.pct*100)/100)).concat([1e-9]));
  all.forEach(r=>{
    const pPct=r.pct*100;
    const w=sqrtBarWidthNorm(pPct,maxSqrt);
    const tip=`${r.name}: ${pPct.toFixed(2)}% of batch · ${(r.pct*batchSize).toFixed(2)} ml (bar √%-scaled)`;
    const t=tip.replace(/"/g,"&quot;");
    const row=document.createElement("div");row.className="ratio-row";
    row.innerHTML=`<div class="ratio-dot" style="background:${r.color}"></div><div class="ratio-name">${r.name}</div><div class="ratio-bar-wrap" title="${t}"><div class="ratio-bar-fill" style="width:${w}%;background:${r.color}" title="${t}"></div></div><div class="ratio-ml">${(r.pct*batchSize).toFixed(1)}ml</div><div class="ratio-pct">${pPct.toFixed(1)}%</div>`;
    list.appendChild(row);
  });
}

function updateBenefits(f){
  const scores={};BENEFIT_LABELS.forEach(b=>scores[b]=0);
  const add=(list,pool,w)=>list.forEach(r=>{const ing=ING[pool].find(x=>x.id===r.ingId);if(!ing)return;Object.entries(ing.benefits||{}).forEach(([b,v])=>{scores[b]=(scores[b]||0)+v*r.pct*w;});});
  add(f.aSplit,"a",1);add(f.bSplit,"b",1.5);add(f.eoSplit,"eo",2);
  const max=Math.max(...Object.values(scores),0.001);
  const sorted=BENEFIT_LABELS.filter(b=>scores[b]>0).sort((a,b)=>scores[b]-scores[a]).slice(0,8);
  const cont=document.getElementById("benefitBars");cont.innerHTML="";
  if(!sorted.length){cont.innerHTML='<div style="font-size:12px;color:var(--color-text-tertiary)">Add ingredients to see benefits</div>';return;}
  const benefitPcts=sorted.map(b=>Math.round((scores[b]/max)*100));
  const maxSqrtBen=Math.max.apply(null,benefitPcts.map(p=>Math.sqrt(Math.max(0,p)/100)).concat([1e-9]));
  sorted.forEach((b,i)=>{
    const pct=benefitPcts[i];
    const w=sqrtBarWidthNorm(pct,maxSqrtBen);
    const col=BENEFIT_COLORS[b]||"#888780";
    const tip=`${b}: ${pct}% vs top benefit (bar √%-scaled)`;
    const t=tip.replace(/"/g,"&quot;");
    const row=document.createElement("div");row.className="benefit-row";
    row.innerHTML=`<div class="benefit-label">${b}</div><div class="benefit-track" title="${t}"><div class="benefit-fill" style="width:${w}%;background:${col}" title="${t}"></div></div><div class="benefit-score">${pct}%</div>`;
    cont.appendChild(row);
  });
}

function updateSynergies(f){
  const cont=document.getElementById("synergyList");cont.innerHTML="";
  const eoIds=f.eoSplit.map(r=>r.ingId),aIds=f.aSplit.map(r=>r.ingId),bIds=f.bSplit.map(r=>r.ingId);
  const hasAny=aIds.length+bIds.length+eoIds.length>0;
  const msgs=[];
  if(eoIds.includes("neroli")&&eoIds.includes("frankincense"))msgs.push({t:"good",m:"Neroli + frankincense — exceptional anti-aging synergy"});
  if(eoIds.includes("neroli")&&eoIds.includes("carrotseed"))msgs.push({t:"good",m:"Neroli + carrot seed — brightening powerhouse"});
  if(eoIds.includes("neroli")&&eoIds.includes("geranium"))msgs.push({t:"good",m:"Neroli + geranium — balanced floral, sebum control"});
  if(eoIds.includes("neroli")&&eoIds.includes("patchouli"))msgs.push({t:"good",m:"Neroli + patchouli — scent beautifully anchored and long-lasting"});
  if(eoIds.includes("helichrysum")&&bIds.includes("tamanu"))msgs.push({t:"good",m:"Helichrysum + tamanu — elite scarring formula"});
  if(eoIds.includes("lavender")&&bIds.includes("calendula"))msgs.push({t:"good",m:"Lavender EO + calendula B — maximally soothing, sensitive skin"});
  if(eoIds.includes("chamomile")&&bIds.includes("calendula"))msgs.push({t:"good",m:"Chamomile EO + calendula B — strong anti-inflammatory pairing"});
  if(eoIds.includes("lavender")&&eoIds.includes("chamomile"))msgs.push({t:"good",m:"Lavender + chamomile EOs — calming, sleep-friendly profile"});
  if(eoIds.includes("frankincense")&&eoIds.includes("sandalwood"))msgs.push({t:"good",m:"Frankincense + sandalwood — classic resinous base, long wear"});
  if(eoIds.includes("frankincense")&&eoIds.includes("lavender"))msgs.push({t:"good",m:"Frankincense + lavender — approachable resin-floral balance"});
  if(eoIds.includes("frankincense")&&eoIds.includes("helichrysum"))msgs.push({t:"good",m:"Frankincense + helichrysum — repair and elasticity focus"});
  if(eoIds.includes("geranium")&&eoIds.includes("lavender"))msgs.push({t:"good",m:"Geranium + lavender — fresh rosy herbal blend"});
  if(eoIds.includes("rose")&&eoIds.includes("geranium"))msgs.push({t:"good",m:"Rose + geranium — lush floral; watch cost if shares are high"});
  if(eoIds.includes("patchouli")&&eoIds.includes("lavender"))msgs.push({t:"good",m:"Patchouli + lavender — popular woody-floral anchor"});
  if(aIds.includes("rosehip")&&eoIds.includes("carrotseed"))msgs.push({t:"good",m:"Rosehip + carrot seed EO — double vitamin A direction"});
  if(aIds.includes("rosehip")&&eoIds.includes("frankincense"))msgs.push({t:"good",m:"Rosehip + frankincense EO — regeneration and barrier support"});
  if(aIds.includes("pomegranate")&&eoIds.includes("frankincense"))msgs.push({t:"good",m:"Pomegranate + frankincense — collagen-focused formula"});
  if(bIds.includes("bakuchiol")&&eoIds.includes("frankincense"))msgs.push({t:"good",m:"Bakuchiol + frankincense — plant retinol-alternative blend"});
  if(aIds.includes("hemp")&&bIds.includes("blackseed"))msgs.push({t:"good",m:"Hemp + black seed — serious anti-acne, anti-inflammatory formula"});
  if(aIds.includes("rosehip")&&bIds.includes("tamanu"))msgs.push({t:"good",m:"Rosehip + tamanu — powerful scarring and skin repair combo"});
  if(bIds.includes("blackseed")&&bIds.includes("neem"))msgs.push({t:"warn",m:"Black seed + neem — very strong scent stack, lower both sliders"});
  if(bIds.includes("turmeric")&&bIds.includes("blackseed"))msgs.push({t:"warn",m:"Turmeric + black seed both strong — keep each at minimum weight"});
  if(eoIds.includes("yylang"))msgs.push({t:"warn",m:"Ylang ylang in blend — verify its share stays under 0.8% of total batch"});
  if(eoIds.includes("clarysage"))msgs.push({t:"warn",m:"Clary sage — do not use in formulas for pregnant users"});
  if(f.eoSplit.length>=4)msgs.push({t:"warn",m:"4+ EOs — structure as top/mid/base to avoid scent clash"});
  if(f.eoSplit.length>=2&&f.eoSplit.length<4)msgs.push({t:"info",m:"Several EOs — assign top / heart / base roles so the scent reads clearly in balm."});
  if(aIds.includes("seabuck"))msgs.push({t:"warn",m:"Sea buckthorn — will visibly tint the balm orange"});
  if(aIds.includes("turmeric")||bIds.includes("turmeric"))msgs.push({t:"warn",m:"Turmeric CO2 — will stain yellow, patch-test on skin before use"});
  const strongBids=["blackseed","neem","turmeric"];
  if(bIds.some(id=>strongBids.includes(id)))msgs.push({t:"info",m:"Strong B-phase oil(s) — citrus, resin, or spice EOs usually mask medicinal bases best."});
  if(!hasAny){
    cont.innerHTML='<div class="synergy-item synergy-info">· Add carriers, actives, and EOs with + above. This panel lists curated pairs, cautions, and a short blend summary.</div>';
    return;
  }
  if(!msgs.length)msgs.push({t:"info",m:"No named library pair matched this exact mix — that is normal. Use sliders and the colored tips under each oil (left) for guidance."});
  msgs.push({t:"info",m:"Blend snapshot: "+f.aSplit.length+" major carrier(s) · "+f.bSplit.length+" minor active(s) · "+f.eoSplit.length+" essential oil(s)."});
  msgs.forEach(m=>{
    const d=document.createElement("div");
    let cls="synergy-item ";
    let pre="";
    if(m.t==="good"){cls+="synergy-good";pre="✓ ";}
    else if(m.t==="warn"){cls+="synergy-warn";pre="! ";}
    else{cls+="synergy-info";pre="· ";}
    d.className=cls;
    d.textContent=pre+m.m;
    cont.appendChild(d);
  });
}

function updateWarnings(f){
  const strongB=f.bSplit.filter(r=>ING.b.find(x=>x.id===r.ingId)?.potency==="strong");
  document.getElementById("bWarning").innerHTML=strongB.length>=2?'<div class="warn">Two strong B oils combined — potency stacks. Lower both sliders to minimum.</div>':"";
  document.getElementById("aWarning").innerHTML="";
  document.getElementById("eoWarning").innerHTML=f.eoSplit.length>=5?'<div class="warn">5+ EOs — structure as top/mid/base notes to keep scent coherent.</div>':"";
  const hasUnsat=f.aSplit.some(r=>["rosehip","hemp","pomegranate","seabuck","chia"].includes(r.ingId))||f.bSplit.some(r=>["blackseed","tamanu","turmeric"].includes(r.ingId));
  document.getElementById("statShelf").textContent=hasUnsat?"8–10mo":"12–18mo";
  document.getElementById("statTotal").textContent=batchSize;
}

renderPool("a");renderPool("b");renderPool("eo");
update();
</script>
